# Сборка Android debug APK
# Запуск: вручную через Actions → Run workflow
# Для release AAB → см. release-android.yml
name: Build Android APK (debug)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      # JDK 21: Android Gradle Plugin 8.13 + compileSdk 36 (Android 16) официально
      # требуют JDK 17 минимум, но на практике под compileSdk 36 нужен JDK 21 —
      # иначе gradle падает при компиляции android platform stub'ов.
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      # Ubuntu-latest имеет предустановленный Android SDK, но обычно API 34/35.
      # У нас compileSdkVersion = 36 (см. android/variables.gradle), его надо докачать.
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      # Синхронизируем versionCode/versionName из package.json в build.gradle —
      # иначе debug APK уйдёт со старой версией.
      - name: Sync Android version from package.json
        run: node scripts/sync-android-version.cjs

      - name: Install dependencies
        # --legacy-peer-deps нужен из-за peer-конфликтов Capacitor 8 / React 19
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build web
        # npm run build вместо vite build напрямую — запускает verify-build-assets
        # после vite build и падает если хоть один фон отсутствует в dist/
        run: npm run build
        env:
          # VITE_API_URL — для веб-сборки (api.js использует этот URL)
          VITE_API_URL: https://highriseheist.com/api
          # VITE_SERVER_URL — КРИТИЧНО для native (Capacitor) сборки:
          # main.jsx в isNative-ветке делает fetch interceptor, который подставляет
          # этот URL в начало каждого /api/* запроса. Также используется для
          # window.__SH_WS_BASE (WebSocket endpoint).
          VITE_SERVER_URL: https://highriseheist.com

      - name: Sync Capacitor
        run: npx cap sync android

      # Диагностика: что реально попало в assets после cap sync.
      # Если фонов здесь нет — проблема в cap sync, не в webview.
      - name: Verify assets in Android assets/
        run: |
          echo "─── Backgrounds in android/app/src/main/assets/public/backgrounds/ ───"
          ls -la android/app/src/main/assets/public/backgrounds/ || echo "❌ Папки нет!"
          echo ""
          echo "─── Должны быть: 6 webp + 4 svg = 10 файлов ───"
          COUNT=$(ls android/app/src/main/assets/public/backgrounds/ 2>/dev/null | wc -l)
          echo "Факт: $COUNT файлов"
          if [ "$COUNT" -lt 10 ]; then
            echo "❌ Фоны не скопировались в APK. Надо разбираться с cap sync."
            exit 1
          fi
          echo "✅ Все фоны на месте в assets"

      # --stacktrace + --info: если снова упадёт — в логах будет полный trace
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace --info

      # Проверка что фоны реально в APK: unzip его и листинг assets
      - name: Verify backgrounds are in final APK
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          echo "─── Заглядываю внутрь APK ───"
          unzip -l "$APK" | grep -E 'backgrounds/.*(webp|svg)$' || {
            echo "❌ Фонов нет в APK!"
            exit 1
          }
          echo "✅ Фоны упакованы в APK"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: highrise-heist-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: warn

      # Если gradle упал — собираем отчёты из android/app/build/reports
      - name: Upload gradle reports (only on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-reports
          path: |
            android/app/build/reports/
            android/build/reports/
          retention-days: 7
          if-no-files-found: ignore
