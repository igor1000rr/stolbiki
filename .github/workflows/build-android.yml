# Сборка Android APK
# Запуск: вручную через Actions → Run workflow
name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      # Ubuntu-latest имеет предустановленный Android SDK, но обычно API 34/35.
      # У нас compileSdkVersion = 36 (см. android/variables.gradle), его надо докачать.
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - name: Install dependencies
        # --legacy-peer-deps нужен из-за peer-конфликтов Capacitor 8 / React 19
        # (тот же флаг использует e2e.yml, где сборка фронта проходит успешно)
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build web
        run: npx vite build
        env:
          VITE_API_URL: https://snatch-highrise.com/api

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: highrise-heist-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
