name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend deps
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Install server deps
        working-directory: server
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: VITE_API_URL=http://localhost:3001/api npm run build

      - name: Copy CSP hashes to server
        run: |
          if [ -f dist/csp-hashes.json ]; then
            cp dist/csp-hashes.json server/csp-hashes.json
            echo "✅ CSP hashes copied"
          else
            echo "⚠️ No csp-hashes.json (build пропустил этот шаг)"
          fi

      # ВАЖНО: удаляем любые остатки DB из прошлых прогонов. CREATE TABLE IF NOT EXISTS
      # не обновляет схему существующей таблицы → если в старой БД нет колонки ref_id
      # (добавленной в недавнем коммите), register падает с 500. runner-ы в CI чистые,
      # но есть actions/cache на некоторые пути — чистим явно.
      - name: Clean DB from previous run
        run: |
          rm -rf server/data
          rm -f server/*.db server/*.db-*
          mkdir -p server/data

      - name: Start backend
        run: |
          cd server
          NODE_ENV=test \
            ALLOWED_ORIGINS=http://localhost:4173,http://localhost:3001 \
            JWT_SECRET=e2e_test_secret_do_not_use_in_prod \
            DB_PATH=./data/e2e-test.db \
            CSP_ALLOW_UNSAFE_INLINE=1 \
            node server.js > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          echo "Backend started with PID $(cat /tmp/backend.pid)"

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "✅ Backend ready"
              curl -s http://localhost:3001/api/health | head -200 || true
              exit 0
            fi
            if ! kill -0 $(cat /tmp/backend.pid) 2>/dev/null; then
              echo "❌ Backend process died. Full log:"
              cat /tmp/backend.log
              exit 1
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 1
          done
          echo "❌ Backend failed to respond. Full log:"
          cat /tmp/backend.log
          exit 1

      - name: Start frontend preview
        run: |
          nohup npx vite preview --port 4173 --host 0.0.0.0 > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid
          echo "Frontend started with PID $(cat /tmp/frontend.pid)"

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:4173 > /dev/null 2>&1; then
              echo "✅ Frontend ready"
              exit 0
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 1
          done
          echo "❌ Frontend failed to start. Full log:"
          cat /tmp/frontend.log
          exit 1

      - name: Run Playwright tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
          API_URL: http://localhost:3001
          CI: true

      - name: Shutdown services
        if: always()
        run: |
          kill $(cat /tmp/backend.pid) 2>/dev/null || true
          kill $(cat /tmp/frontend.pid) 2>/dev/null || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload backend + frontend logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            /tmp/backend.log
            /tmp/frontend.log
          retention-days: 7
          if-no-files-found: ignore
