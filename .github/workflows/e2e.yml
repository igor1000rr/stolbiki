name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    # continue-on-error: true оставлено в коде, чтобы падение E2E не блокировало deploy
    # (тесты молодые, может быть flaky). Уберём когда стабилизируется.
    continue-on-error: true
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend deps
        run: npm install --legacy-peer-deps

      - name: Install server deps
        run: cd server && npm ci

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(node -p \"require('./node_modules/@playwright/test/package.json').version\")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # Билд с API URL указывающим на локальный бекенд (который поднимем через шаг ниже).
      - name: Build frontend
        run: VITE_API_URL=http://localhost:3001/api npm run build

      # Backend запускается в фоне. NODE_ENV=test → CSP fallback, ALLOWED_ORIGINS пропускает preview.
      # VITEST не ставим: должна быть реальная SQLite БД (не :memory:), иначе register/login
      # между разными запросами не работают.
      - name: Start backend
        run: |
          cd server
          mkdir -p data
          NODE_ENV=test \
            ALLOWED_ORIGINS=http://localhost:4173,http://localhost:3001 \
            JWT_SECRET=e2e_test_secret_do_not_use_in_prod \
            DB_PATH=./data/e2e-test.db \
            node server.js > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3001/api/health > /dev/null; then
              echo "✅ Backend ready"
              curl -s http://localhost:3001/api/health | head -200
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 1
          done
          echo "❌ Backend failed to start. Last 50 lines of log:"
          tail -50 /tmp/backend.log
          exit 1

      - name: Start frontend preview
        run: |
          npx vite preview --port 4173 --host 0.0.0.0 > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:4173 > /dev/null; then
              echo "✅ Frontend ready"
              exit 0
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 1
          done
          echo "❌ Frontend failed to start. Last 50 lines of log:"
          tail -50 /tmp/frontend.log
          exit 1

      - name: Run Playwright tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
          API_URL: http://localhost:3001
          CI: true

      - name: Shutdown services
        if: always()
        run: |
          kill $(cat /tmp/backend.pid) 2>/dev/null || true
          kill $(cat /tmp/frontend.pid) 2>/dev/null || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload backend logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs
          path: |
            /tmp/backend.log
            /tmp/frontend.log
          retention-days: 7
