# Release Android AAB (App Bundle) для Play Store
#
# Запуск: только вручную через Actions → Release Android → Run workflow.
# Собирает подписанный .aab из keystore в секретах, загружает как artifact.
#
# ═══ Обязательные секреты ═══
# Settings → Secrets → Actions:
#   ANDROID_KEYSTORE_BASE64   — base64(upload-keystore.jks)
#   ANDROID_KEYSTORE_PASSWORD — пароль keystore
#   ANDROID_KEY_ALIAS         — alias ключа (обычно "upload")
#   ANDROID_KEY_PASSWORD      — пароль ключа
#
# ═══ Опциональные секреты ═══
# AdMob IDs (если не заданы — используются Google public test IDs):
#   ADMOB_APP_ID_ANDROID, ADMOB_INTERSTITIAL_ANDROID,
#   ADMOB_REWARDED_ANDROID, ADMOB_BANNER_ANDROID
#
# Firebase Cloud Messaging (если не задан — push на native Android работать не будет,
# веб-push через VAPID продолжит работать):
#   GOOGLE_SERVICES_JSON — base64 от google-services.json из Firebase Console
#
# ═══ Генерация keystore (один раз, локально) ═══
#   keytool -genkey -v -keystore upload-keystore.jks \
#     -keyalg RSA -keysize 2048 -validity 10000 -alias upload
#   base64 -w0 upload-keystore.jks
#
# После успешного билда: artifact `highrise-heist-release-aab` → скачать →
# загрузить в Play Console (Internal testing / Production).

name: Release Android AAB

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store трек (для информации в названии artifact)'
        required: false
        type: choice
        default: 'internal'
        options:
          - internal
          - alpha
          - beta
          - production

concurrency:
  group: release-android
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Передаём секреты в env на уровне job — тогда их можно использовать в if:
    # через env.X != '' (secrets.X недоступен в if прямым выражением).
    env:
      HAS_ADMOB: ${{ secrets.ADMOB_APP_ID_ANDROID != '' }}
      HAS_FCM: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
    steps:
      - uses: actions/checkout@v5

      - name: Check required secrets
        run: |
          missing=""
          [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]   && missing="$missing ANDROID_KEYSTORE_BASE64"
          [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] && missing="$missing ANDROID_KEYSTORE_PASSWORD"
          [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ]         && missing="$missing ANDROID_KEY_ALIAS"
          [ -z "${{ secrets.ANDROID_KEY_PASSWORD }}" ]      && missing="$missing ANDROID_KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "❌ Отсутствуют секреты:$missing"
            echo "См. комментарий в .github/workflows/release-android.yml"
            exit 1
          fi
          echo "✅ Обязательные секреты на месте"
          [ "$HAS_ADMOB" = "true" ] && echo "✅ AdMob prod IDs настроены" || echo "ℹ️ AdMob prod IDs не заданы — будут Google test ads"
          [ "$HAS_FCM" = "true" ]   && echo "✅ Firebase настроен"       || echo "ℹ️ GOOGLE_SERVICES_JSON не задан — FCM push отключён"

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - name: Sync Android version from package.json
        run: node scripts/sync-android-version.cjs

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/upload-keystore.jks
          ls -la android/upload-keystore.jks

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=../upload-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      # Опционально: google-services.json из секрета → включается плагин com.google.gms.google-services
      # и нативный FCM push заработает. Без этого push работает только через Web Push API (VAPID) в браузере.
      - name: Decode google-services.json (optional)
        if: env.HAS_FCM == 'true'
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json
          echo "✅ google-services.json установлен"

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build web (production)
        run: npx vite build
        env:
          VITE_API_URL: https://highriseheist.com/api
          VITE_SERVER_URL: https://highriseheist.com
          # AdMob — если секреты не заданы, env будут пустыми и admob.js
          # автоматически переключится на Google test IDs (см. engine/admob.js).
          VITE_ADMOB_APP_ID_ANDROID:        ${{ secrets.ADMOB_APP_ID_ANDROID }}
          VITE_ADMOB_INTERSTITIAL_ANDROID:  ${{ secrets.ADMOB_INTERSTITIAL_ANDROID }}
          VITE_ADMOB_REWARDED_ANDROID:      ${{ secrets.ADMOB_REWARDED_ANDROID }}
          VITE_ADMOB_BANNER_ANDROID:        ${{ secrets.ADMOB_BANNER_ANDROID }}

      - name: Sync Capacitor
        run: npx cap sync android

      # Gradle properties:
      #   -PadmobAppId=... резолвится в AndroidManifest placeholder ${admobAppId}
      #   (см. android/app/build.gradle). Если секрет пустой — используется
      #   Google public test app ID, fallback прописан в build.gradle.
      - name: Compute gradle properties
        id: gradle_props
        run: |
          if [ "$HAS_ADMOB" = "true" ]; then
            echo "props=-PadmobAppId=${{ secrets.ADMOB_APP_ID_ANDROID }}" >> $GITHUB_OUTPUT
          else
            echo "props=" >> $GITHUB_OUTPUT
          fi

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease ${{ steps.gradle_props.outputs.props }} --stacktrace

      - name: Build release APK (универсальный, для sideload/тестов)
        working-directory: android
        run: ./gradlew assembleRelease ${{ steps.gradle_props.outputs.props }} --stacktrace

      - name: Get version from package.json
        id: version
        run: echo "v=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Rename artifacts with version
        run: |
          mkdir -p release-artifacts
          cp android/app/build/outputs/bundle/release/app-release.aab \
             release-artifacts/highrise-heist-v${{ steps.version.outputs.v }}-${{ github.event.inputs.track }}.aab
          cp android/app/build/outputs/apk/release/app-release.apk \
             release-artifacts/highrise-heist-v${{ steps.version.outputs.v }}-${{ github.event.inputs.track }}.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: highrise-heist-release-aab
          path: release-artifacts/*.aab
          retention-days: 90
          if-no-files-found: error

      - name: Upload APK artifact (for sideload)
        uses: actions/upload-artifact@v4
        with:
          name: highrise-heist-release-apk
          path: release-artifacts/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        run: |
          AAB=$(ls -la release-artifacts/*.aab | awk '{print $5, $9}')
          APK=$(ls -la release-artifacts/*.apk | awk '{print $5, $9}')
          ADMOB_MODE="test IDs"
          FCM_MODE="web push only"
          [ "$HAS_ADMOB" = "true" ] && ADMOB_MODE="prod IDs"
          [ "$HAS_FCM" = "true" ]   && FCM_MODE="enabled"
          echo "### 📦 Release build v${{ steps.version.outputs.v }} (${{ github.event.inputs.track }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**AAB:** \`$AAB\`" >> $GITHUB_STEP_SUMMARY
          echo "**APK:** \`$APK\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "AdMob: $ADMOB_MODE" >> $GITHUB_STEP_SUMMARY
          echo "FCM:   $FCM_MODE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Скачай AAB и загрузи в Play Console." >> $GITHUB_STEP_SUMMARY

      - name: Upload gradle reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-reports-release
          path: |
            android/app/build/reports/
            android/build/reports/
          retention-days: 7
          if-no-files-found: ignore
