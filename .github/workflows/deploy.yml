name: Deploy to VPS

on:
  push:
    branches: [main]

# Отменяем предыдущие билды — собирается только последний
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Run Tests
        run: npx vitest run

      - name: Build Frontend
        run: |
          VITE_API_URL=/api npm run build
          # Инъекция build hash в Service Worker
          BUILD_HASH=$(git rev-parse --short HEAD)-$(date +%s)
          sed -i "s/__BUILD_HASH__/$BUILD_HASH/g" dist/sw.js

      - name: Upload Frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/*"
          target: /opt/stolbiki-web
          strip_components: 1
          rm: true

      - name: Upload Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "server/"
          target: /opt/stolbiki-api
          strip_components: 1
          overwrite: true

      - name: Install & Restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/stolbiki-api
            mkdir -p logs backups
            # Бэкап БД перед деплоем
            if [ -f data/stolbiki.db ]; then
              sqlite3 data/stolbiki.db ".backup backups/pre-deploy-$(date +%Y%m%d_%H%M%S).db"
              # Оставляем последние 7 бэкапов
              ls -t backups/pre-deploy-*.db 2>/dev/null | tail -n +8 | xargs rm -f 2>/dev/null || true
            fi
            npm install --omit=dev
            pm2 restart ecosystem.config.cjs 2>/dev/null || \
              pm2 start ecosystem.config.cjs
            pm2 save
            # pm2-logrotate (один раз)
            pm2 install pm2-logrotate 2>/dev/null || true
            pm2 set pm2-logrotate:max_size 10M 2>/dev/null || true
            pm2 set pm2-logrotate:retain 7 2>/dev/null || true
            # Добавляем WebSocket если нет
            if ! grep -q '/ws' /etc/nginx/sites-available/stolbiki 2>/dev/null; then
              sed -i '/location \/api\//i\    location /ws {\n        proxy_pass http://127.0.0.1:3001;\n        proxy_http_version 1.1;\n        proxy_set_header Upgrade $http_upgrade;\n        proxy_set_header Connection "upgrade";\n        proxy_set_header Host $host;\n        proxy_read_timeout 3600s;\n    }\n' /etc/nginx/sites-available/stolbiki
            fi
            # Кеш: HTML без кеша, статика с хешами — долгий кеш
            if ! grep -q 'no-store' /etc/nginx/sites-available/stolbiki 2>/dev/null; then
              # Находим блок location / { и добавляем внутрь заголовки
              sed -i '/root.*stolbiki-web/a\        # HTML — не кешировать (Vite assets имеют хеши)\n        add_header Cache-Control "no-cache, no-store, must-revalidate" always;\n        location ~* \\.(js|css|woff2|png|webp|ico|svg|json)$ {\n            add_header Cache-Control "public, max-age=31536000, immutable";\n        }' /etc/nginx/sites-available/stolbiki
            fi
            # Gzip для JSON/bin (GPU weights ~3.2MB → ~800KB)
            if ! grep -q 'gzip_types.*application/json' /etc/nginx/sites-available/stolbiki 2>/dev/null && ! grep -q 'gzip_types.*application/json' /etc/nginx/nginx.conf 2>/dev/null; then
              grep -q 'gzip on' /etc/nginx/nginx.conf 2>/dev/null || sed -i '/http {/a\    gzip on;\n    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/octet-stream;\n    gzip_min_length 1000;\n    gzip_comp_level 6;' /etc/nginx/nginx.conf
            fi
            nginx -t && systemctl reload nginx
            echo "✅ $(date): deploy done"
