name: Deploy to VPS

on:
  push:
    branches: [main]

# Отменяем предыдущие билды — собирается только последний
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install (frontend)
        run: npm install --legacy-peer-deps

      - name: Install (server)
        run: cd server && npm ci

      - name: Run Tests
        run: npx vitest run

      - name: Build Frontend
        run: |
          VITE_API_URL=/api npm run build
          # Инъекция build hash в Service Worker
          BUILD_HASH=$(git rev-parse --short HEAD)-$(date +%s)
          sed -i "s/__BUILD_HASH__/$BUILD_HASH/g" dist/sw.js

      - name: Sync version to server
        run: |
          # /api/health читает server/package.json в проде (корневой package.json не деплоится).
          # Синхронизируем версию из корня чтобы /api/health показывал актуальную.
          ROOT_VERSION=$(node -p "require('./package.json').version")
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('server/package.json','utf8')); p.version='$ROOT_VERSION'; fs.writeFileSync('server/package.json', JSON.stringify(p, null, 2) + '\n')"

      - name: Upload Frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/*"
          target: /opt/stolbiki-web
          strip_components: 1
          rm: true

      - name: Upload Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "server/"
          target: /opt/stolbiki-api
          strip_components: 1
          overwrite: true

      - name: Install & Restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/stolbiki-api
            mkdir -p logs backups
            # Бэкап БД перед деплоем
            if [ -f data/stolbiki.db ]; then
              sqlite3 data/stolbiki.db ".backup backups/pre-deploy-$(date +%Y%m%d_%H%M%S).db" 2>/dev/null || cp data/stolbiki.db "backups/pre-deploy-$(date +%Y%m%d_%H%M%S).db"
              ls -t backups/pre-deploy-*.db 2>/dev/null | tail -n +8 | xargs rm -f 2>/dev/null || true
            fi
            npm install --omit=dev
            pm2 restart ecosystem.config.cjs 2>/dev/null || pm2 start ecosystem.config.cjs
            pm2 save
            # pm2-logrotate (один раз)
            pm2 install pm2-logrotate 2>/dev/null || true
            pm2 set pm2-logrotate:max_size 10M 2>/dev/null || true
            pm2 set pm2-logrotate:retain 7 2>/dev/null || true
            # Nginx: только reload (конфиг управляется upgrade-vps.sh)
            nginx -t && systemctl reload nginx
            echo "✅ $(date): deploy done, v$(node -e "console.log(require('./package.json').version || '?')" 2>/dev/null || echo '?')"
