name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build Frontend
        run: |
          npm install
          VITE_API_URL=/api npm run build

      - name: Upload Frontend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/*"
          target: /opt/stolbiki-web
          strip_components: 1

      - name: Upload Server to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "server/package.json,server/server.js,server/ecosystem.config.cjs"
          target: /opt/stolbiki-api
          strip_components: 1

      - name: Restart Services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/stolbiki-api
            npm install --production
            pm2 restart ecosystem.config.cjs 2>/dev/null || \
              pm2 start ecosystem.config.cjs
            pm2 save
            nginx -t && systemctl reload nginx
            echo "✅ $(date): фронт + бэк задеплоены"
