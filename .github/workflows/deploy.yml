name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Пропустить тесты (быстрый ре-деплой)'
        required: false
        type: boolean
        default: false
      reason:
        description: 'Причина ручного деплоя (для аудита)'
        required: false
        type: string
        default: 'manual rerun'

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # secrets.X нельзя использовать в if: на шаге напрямую — кидает
    # "Unrecognized named-value: 'secrets'" и ломает весь workflow.
    # Транслируем в job-level env — это разрешено.
    env:
      HAS_SENTRY_UPLOAD: ${{ secrets.SENTRY_AUTH_TOKEN != '' && secrets.SENTRY_ORG != '' && secrets.SENTRY_PROJECT != '' }}
    steps:
      - name: Log dispatch context
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "⚡️ Manual deploy by ${{ github.actor }}"
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo "Skip tests: ${{ github.event.inputs.skip_tests }}"

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Sync server lockfile (auto-regenerate if out of sync)
        run: |
          cd server
          if npm ci --dry-run >/dev/null 2>&1; then
            echo "✅ server/package-lock.json в sync"
          else
            echo "⚠️ server/package-lock.json устарел — регенерирую..."
            npm install --package-lock-only --ignore-scripts
            cd ..
            if ! git diff --quiet server/package-lock.json; then
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add server/package-lock.json
              git commit -m "chore(ci): auto-regenerate server/package-lock.json [skip ci]"
              git push
              echo "✅ Lockfile регенерирован и запушен"
            else
              echo "ℹ️ npm install --package-lock-only не изменил lock — продолжаем"
            fi
          fi

      - name: Install (frontend)
        run: npm install --legacy-peer-deps

      - name: Install (server)
        run: cd server && npm ci

      - name: Lint
        # Блокирует на errors (rules-of-hooks, no-undef, no-empty без catch, и т.п.)
        # Стилистические (no-unused-vars, exhaustive-deps, set-state-in-effect, purity,
        # immutability, refs, only-export-components) — warnings, не блокируют.
        run: npm run lint

      - name: Run Tests
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests != 'true'
        run: npx vitest run

      - name: Build Frontend
        run: |
          VITE_API_URL=/api npm run build
          BUILD_HASH=$(git rev-parse --short HEAD)-$(date +%s)
          sed -i "s/__BUILD_HASH__/$BUILD_HASH/g" dist/sw.js
        env:
          # Sentry DSN попадёт в bundle через import.meta.env.VITE_SENTRY_DSN.
          # Если секрет пустой — Sentry не инициализируется (см. src/engine/sentry.js).
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      # Sentry release + upload sourcemaps — только когда все 3 секрета заданы.
      # Проверка идёт через env.HAS_SENTRY_UPLOAD (см. сверху) — это валидно,
      # в отличие от прямого secrets.X который ломает парсер workflow.
      - name: Sentry Release + Upload Sourcemaps
        if: env.HAS_SENTRY_UPLOAD == 'true'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "⬆️ Uploading sourcemaps to Sentry for release v$VERSION"
          npx @sentry/cli releases new "$VERSION"
          npx @sentry/cli releases files "$VERSION" upload-sourcemaps ./dist \
            --url-prefix '~/assets' \
            --rewrite \
            --ignore-file .sentryignore \
            --strip-common-prefix || true
          npx @sentry/cli releases set-commits "$VERSION" --auto || true
          npx @sentry/cli releases finalize "$VERSION"
          echo "✅ Sentry release v$VERSION finalized"

      # Удаляем .map файлы перед деплоем на VPS — не раздаём дебаг-инфо конечным
      # пользователям. Sentry уже получил копии через upload выше (если был включён).
      - name: Strip sourcemaps from dist
        run: |
          find dist -name '*.map' -delete 2>/dev/null || true
          echo "✅ Sourcemaps removed from dist"

      - name: Sync version to server
        run: |
          ROOT_VERSION=$(node -p "require('./package.json').version")
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('server/package.json','utf8')); p.version='$ROOT_VERSION'; fs.writeFileSync('server/package.json', JSON.stringify(p, null, 2) + '\n')"

      - name: Clean server test artifacts before upload
        run: |
          rm -f server/.jwt-secret
          rm -f server/.vapid
          rm -rf server/data
          rm -f server/*.db server/*.db-*

      - name: Upload Frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/*"
          target: /opt/stolbiki-web
          strip_components: 1
          rm: true

      - name: Upload Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "server/"
          target: /opt/stolbiki-api
          strip_components: 1
          overwrite: true

      - name: Install & Restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/stolbiki-api
            mkdir -p logs backups
            if [ -f data/stolbiki.db ]; then
              sqlite3 data/stolbiki.db ".backup backups/pre-deploy-$(date +%Y%m%d_%H%M%S).db" 2>/dev/null || cp data/stolbiki.db "backups/pre-deploy-$(date +%Y%m%d_%H%M%S).db"
              ls -t backups/pre-deploy-*.db 2>/dev/null | tail -n +8 | xargs rm -f 2>/dev/null || true
            fi
            npm install --omit=dev
            pm2 restart ecosystem.config.cjs 2>/dev/null || pm2 start ecosystem.config.cjs
            pm2 save
            pm2 install pm2-logrotate 2>/dev/null || true
            pm2 set pm2-logrotate:max_size 10M 2>/dev/null || true
            pm2 set pm2-logrotate:retain 7 2>/dev/null || true
            nginx -t && systemctl reload nginx
            VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "?")
            echo "✅ $(date): deploy done, v$VERSION"
