apply plugin: 'com.android.application'

// Signing config из keystore.properties (не коммитится).
// В CI (Actions) файл генерируется перед билдом из секретов — см. release-android.yml.
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

// AdMob APPLICATION_ID — резолвится в AndroidManifest через placeholder ${admobAppId}.
// В CI передаётся через -PadmobAppId=... из секрета ADMOB_APP_ID_ANDROID.
// Fallback — Google public test ID, безопасный (реальный трафик по нему не идёт).
def admobAppIdProp = project.findProperty('admobAppId') ?: 'ca-app-pub-3940256099942544~3347511713'

android {
    namespace = "com.highriseheist.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.highriseheist.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // Версия синхронизируется скриптом scripts/sync-android-version.cjs из package.json.
        // Не править руками — CI перезатрёт.
        versionCode 50922
        versionName "5.9.22"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        manifestPlaceholders = [admobAppId: admobAppIdProp]
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    if (keystorePropertiesFile.exists()) {
        signingConfigs {
            release {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }
    buildTypes {
        release {
            // ВРЕМЕННО: minify/shrink отключены до диагностики краша.
            // Когда починим ProGuard-правила, вернуть minifyEnabled=true + shrinkResources=true.
            // Без минификации APK больше на ~3MB, но гарантированно запускается.
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (keystorePropertiesFile.exists()) {
                signingConfig signingConfigs.release
            }
        }
        debug {
            minifyEnabled false
            // applicationIdSuffix убран: ломает deep links, autoVerify и
            // локальное перезатирание существующей установки релиз-сборки.
            versionNameSuffix "-debug"
        }
    }
    // App Bundle (AAB) конфиг — Play Store с авг 2021 требует AAB вместо APK.
    // enableSplit=true делит по density/language/abi → меньший размер у пользователя.
    bundle {
        language { enableSplit = true }
        density  { enableSplit = true }
        abi      { enableSplit = true }
    }
    // noCompress — какие типы файлов НЕ сжимать zip'ом в APK.
    //   .bin  — NN weights (3.5MB), WebView не смапит их напрямую если сжаты
    //   .webp — уже сжаты (lossy), повторный gzip бесполезен, но замедляет отдачу
    //   .svg  — в старых WebView (Android 7-) сжатые SVG иногда не загружались
    //   без Content-Encoding, лучше хранить raw
    androidResources {
        noCompress += ['bin', 'webp', 'svg']
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
